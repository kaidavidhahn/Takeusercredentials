<!DOCTYPE html>
<html>
<body>

<input id="Input" type="text" placeholder="Type something...">
<button onclick="sendData()">Add</button>

<script>

function sendData() {

    const value = document.getElementById("Input").value;

    fetch("/add", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({text: value})
    })
    .then(r => r.json())
    .then(data => {
        alert(data.status);
    });

}

</script>

</body>
</html>
